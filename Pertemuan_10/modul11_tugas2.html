<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Data Praktikan PPW1</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5" id="konten"></div>

    <script>
      let isPraktikan = confirm("Apakah Anda praktikan PPW1?");
      let wadah = document.getElementById("konten");

      if (isPraktikan) {
        let nama = prompt("Masukkan Nama:");
        let nim = prompt("Masukkan NIM:");
        let angkatan = prompt("Masukkan Angkatan:");

        // Menggunakan innerHTML untuk merender struktur tabel Bootstrap
        wadah.innerHTML = `
                <h2 class="mb-4">Data Praktikan PPW1</h2>
                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Atribut</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Nama</td>
                            <td>${nama}</td>
                        </tr>
                        <tr>
                            <td>NIM</td>
                            <td>${nim}</td>
                        </tr>
                        <tr>
                            <td>Angkatan</td>
                            <td>${angkatan}</td>
                        </tr>
                    </tbody>
                </table>
            `;
      } else {
        wadah.innerHTML = `<div class="alert alert-danger" role="alert">
                Anda bukan praktikan PPW1, Anda tidak boleh masuk!
            </div>`;
      }
    </script>
  </body>
</html>
