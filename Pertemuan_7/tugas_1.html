<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas 1 - CSS Position</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f9;
        height: 2000px; /* Ditambahkan agar halaman bisa di-scroll untuk melihat efek sticky dan fixed */
      }

      /* Container untuk meletakkan kartu di tengah */
      .container {
        display: flex;
        justify-content: center;
        margin-top: 100px;
      }

      /* Kartu Profil (Parent Container) */
      .profile-card {
        background-color: white;
        width: 280px;
        height: 350px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        position: relative; /* Sebagai acuan untuk elemen absolute di dalamnya */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      }

      /* Badge Status (Child) */
      .status-badge {
        background-color: #e8f8f5;
        color: #27ae60;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
        position: absolute; /* Posisinya bergantung pada profile-card */
        top: 15px; /* Menempel di atas */
        right: 15px; /* Menempel di kanan */
        z-index: 10; /* Bonus: Selalu di atas konten kartu lainnya */
      }

      /* Sticky Navbar */
      .navbar {
        background-color: #2c3e50;
        color: white;
        padding: 15px 20px;
        text-align: center;
        font-weight: bold;
        position: sticky; /* Hibrida antara relative dan fixed saat di-scroll */
        top: 0; /* Menempel di atas */
        z-index: 100; /* Bonus: Agar navbar tidak tertutup elemen lain saat scroll */
      }

      /* Tombol Back to Top */
      .btn-top {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 15px 20px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        position: fixed; /* Menempel di layar, tidak terpengaruh scroll */
        bottom: 30px; /* Jarak dari bawah layar */
        right: 30px; /* Jarak dari kanan layar */
        z-index: 99; /* Bonus: Selalu di depan elemen lain (kecuali navbar yang z-index 100) */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      /* Elemen pemanis kartu profil */
      .avatar {
        width: 100px;
        height: 100px;
        background-image: url("./img/dwb.jpg");
        background-size: cover; /* membuat gambar memenuhi area */
        background-position: center; /* posisi tetap di tengah */
        background-repeat: no-repeat; /* tidak diulang */
        border-radius: 50%;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="navbar">Ini adalah Sticky Navbar (Scroll ke bawah!)</div>

    <div class="container">
      <div class="profile-card">
        <div class="status-badge">Online 🟢</div>
        <div class="avatar"></div>
        <h3>Nyoman Dimas</h3>
        <p>Software Engineer</p>
      </div>
    </div>

    <button class="btn-top" onclick="window.scrollTo(0, 0)">Back to Top</button>
  </body>
</html>
