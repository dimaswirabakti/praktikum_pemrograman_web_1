<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas 3 - Animasi & Transisi</title>
    <style>
      /* CSS Variables (Palet Warna) */
      :root {
        --primary: #3498db;
        --secondary: #9b59b6;
        --danger: #e74c3c;
        --background: #fdfdfd;
        --text-dark: #2c3e50;
        --white: #ffffff;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: var(--background);
        color: var(--text-dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px;
        gap: 50px;
      }

      /* Elemen Fade In */
      .fade-in-element {
        font-size: 24px;
        font-weight: bold;
        /* Memanggil animasi fadeIn */
        animation: fadeIn 2s ease-in forwards;
        opacity: 0; /* Mulai dari transparan */
      }
      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(-20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Efek Hover Tombol menggunakan Transition */
      .btn-container {
        display: flex;
        gap: 20px;
      }
      .btn {
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        color: var(--white);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        /* Properti yang akan ditransisikan secara mulus */
        transition:
          background-color 0.3s ease,
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      /* Tombol 1: Ganti Warna */
      .btn-color {
        background-color: var(--primary);
      }
      .btn-color:hover {
        background-color: #2980b9;
      }

      /* Tombol 2: Transformasi Scale/Membesar */
      .btn-transform {
        background-color: var(--secondary);
      }
      .btn-transform:hover {
        transform: scale(1.1) translateY(-3px);
      }

      /* Tombol 3: Muncul Bayangan (Box Shadow) */
      .btn-shadow {
        background-color: var(--danger);
      }
      .btn-shadow:hover {
        box-shadow: 0 10px 15px rgba(231, 76, 60, 0.4);
      }

      /* Loading Spinner */
      .spinner {
        width: 50px;
        height: 50px;
        margin: auto;
        border: 6px solid #ecf0f1;
        border-top: 6px solid var(--primary);
        border-radius: 50%;
        /* Menggunakan @keyframes */
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* BONUS: Kartu yang berputar saat di-hover (rotateY) */
      .card-scene {
        width: 200px;
        height: 250px;
        perspective: 1000px; /* untuk memberikan efek kedalaman 3D */
      }
      .flip-card {
        width: 100%;
        height: 100%;
        background-color: var(--primary);
        color: var(--white);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: bold;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        /* Transisi untuk transformasi 3D */
        transition: transform 0.8s ease;
        transform-style: preserve-3d;
      }
      .card-scene:hover .flip-card {
        /* Memutar kartu pada sumbu Y */
        transform: rotateY(180deg);
        background-color: var(
          --secondary
        ); /* Warnanya diubah juga supaya efeknya keren */
      }
    </style>
  </head>
  <body>
    <div class="fade-in-element">👋 Halo! Saya muncul dengan efek Fade In.</div>

    <div class="btn-container">
      <button class="btn btn-color">Hover Warna</button>
      <button class="btn btn-transform">Hover Transform</button>
      <button class="btn btn-shadow">Hover Shadow</button>
    </div>

    <div>
      <h3 style="text-align: center">Loading Spinner</h3>
      <div class="spinner"></div>
    </div>

    <div>
      <h3 style="text-align: center">Bonus: 3D Flip Card</h3>
      <div class="card-scene">
        <div class="flip-card">Hover Saya!</div>
      </div>
    </div>
  </body>
</html>
