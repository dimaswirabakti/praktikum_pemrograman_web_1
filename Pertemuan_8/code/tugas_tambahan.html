<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTS no 10 b2</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <!-- HEADER -->
    <header class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold logo" href="#">MyBrand</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <nav
          class="collapse navbar-collapse"
          id="navMenu"
          aria-label="Navigasi utama"
        >
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">Tentang</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Kontak</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- MAIN -->
    <main class="container my-5">
      <article class="card shadow-sm mx-auto" style="max-width: 720px">
        <img
          src="./img/ilustrasi_artikel.jpg"
          class="card-img-top"
          alt="Foto ilustrasi artikel"
        />
        <div class="card-body p-4">
          <h1 class="card-title fs-3 fw-bold">Judul Artikel</h1>
          <p class="card-text text-muted">Isi konten artikel...</p>
        </div>
      </article>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0">&copy; 2024 MyBrand</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
